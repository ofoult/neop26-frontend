<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>neop — tickets to the world's best events</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #07070b;
    --bg-2: #0d0d14;
    --surface: rgba(255,255,255,0.045);
    --surface-2: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.10);
    --border-2: rgba(255,255,255,0.16);
    --text: #f5f4f8;
    --dim: rgba(245,244,248,0.62);
    --faint: rgba(245,244,248,0.40);
    --sans: 'Schibsted Grotesk', system-ui, sans-serif;
    --serif: 'Instrument Serif', Georgia, serif;
    --accent: #7c3aed;
    --accent-2: #ec4899;
    --accent-ink: #ffffff;
    --grad: linear-gradient(115deg, var(--accent), var(--accent-2));
    --r: 16px;
    --maxw: 1240px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }
  ::selection { background: var(--accent); color: #fff; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input { font-family: inherit; }
  img { display: block; max-width: 100%; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.14); border-radius: 20px; }
  ::-webkit-scrollbar-track { background: transparent; }

  .serif { font-family: var(--serif); font-weight: 400; }
  .ital { font-style: italic; }

  /* fade/slide entrance */
  @keyframes neopUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: none; } }
  @keyframes neopFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .up { animation: neopUp .7s cubic-bezier(.2,.7,.2,1) both; }

  /* image fallback gradient */
  .imgwrap { position: relative; overflow: hidden; background:
     radial-gradient(120% 120% at 20% 10%, var(--accent), transparent 55%),
     radial-gradient(120% 120% at 90% 90%, var(--accent-2), transparent 55%),
     #15151f; }
  .imgwrap img { position: relative; transition: transform .9s cubic-bezier(.2,.7,.2,1); }

  #root { min-height: 100vh; }

  .focus-ring:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="neop/data.js"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="neop/components.jsx"></script>
  <script type="text/babel" src="neop/screens.jsx"></script>
  <script type="text/babel" src="neop/flow.jsx"></script>
  <script type="text/babel" src="neop/app.jsx"></script>
</body>
</html>
